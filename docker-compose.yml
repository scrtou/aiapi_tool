version: '3'
services:
  aiapi-tool:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5557:5557"
    networks:
      aiapi_shared:
        aliases:
          - aiapi-tool
    # 使用 bridge 网络并显式映射端口，避免 host 网络带来的安全风险

networks:
  aiapi_shared:
    external: true
    name: aiapi_shared
